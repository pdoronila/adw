# adw operating on itself — the system that builds the system.
version: 1

gates:
  lint:      {command: "uv run ruff check .", timeout: 120}
  typecheck: {command: "uv run mypy", timeout: 300}
  test:      {command: "uv run pytest -x -q", timeout: 900}

agents:
  default: {backend: claude-code, model: opus}
  roles:
    plan:   {backend: claude-code, model: fable}
    build:  {backend: claude-code, model: fable}
    review: {backend: claude-code, model: opus}
    # opinions = cheapest rung: diverse quick takes; router keeps them here (nothing below haiku)
    fusion:opinion_a: {backend: claude-code, model: sonnet}
    fusion:opinion_b: {backend: codex, model: gpt-5.6-luna}   # cheap/fast codex opinion (routes on the codex ladder)
    # the merger = top rung (expensive); router only steps it DOWN under limit pressure
    fusion:fusion:    {backend: claude-code, model: fable}
    fusion:validator: {backend: claude-code, model: opus}   # writes the validation gate

fusion:
  opinions: [opinion_a, opinion_b]

workflow:
  max_fix_iterations: 3
  gate_order: [lint, typecheck, test]

model_router:
  enabled: true
  ladders:
    claude-code: [fable, opus, sonnet, haiku]   # fable is the ceiling; roles at fable/opus route down this ladder
    codex: [gpt-5.6-sol, gpt-5.6-terra, gpt-5.6-luna]   # best -> cheapest (add gpt-5.4-mini as an even cheaper floor)

# Each run in its own git worktree; use `--isolation container` per-run for a VM.
isolation:
  type: worktree

ship:
  branch_prefix: "adw/"
  land: true        # auto squash-rebase the work branch into base + push; takes precedence over create_pr
  create_pr: true   # fallback when land is off: ship pushes the branch + opens a PR, or degrades gracefully
