# adw operating on itself — the system that builds the system.
# NOTE: temporary settings for a container dogfood run (sonnet + container +
# create_pr off + longer timeouts). Reverted after the run.
version: 1

gates:
  lint:      {command: "uv run ruff check .", timeout: 300}
  typecheck: {command: "uv run mypy", timeout: 600}
  test:      {command: "uv run pytest -x -q", timeout: 1200}

agents:
  default: {backend: claude-code, model: sonnet}   # Max-plan OAuth covers sonnet in-container

workflow:
  max_fix_iterations: 3
  gate_order: [lint, typecheck, test]

# Run each step's agent + gates inside an Apple container (VM-level isolation).
isolation:
  type: container

ship:
  branch_prefix: "adw/"
  create_pr: false   # avoid the branch-push step during the dogfood run
