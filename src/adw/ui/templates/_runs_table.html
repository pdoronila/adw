{% if runs %}
<table class="runs">
  <thead>
    <tr><th>run</th><th>workflow</th><th>task</th><th>status</th><th class="num">cost</th><th>updated</th></tr>
  </thead>
  <tbody>
    {% for run in runs %}{% include "_run_row.html" %}{% endfor %}
  </tbody>
</table>
{% elif run_count %}
<div class="empty">No runs match — clear filters to see all {{ run_count }}.</div>
{% else %}
<div class="empty">No runs yet — start one below.</div>
{% endif %}
