<tr>
  <td class="mono"><a href="{{ root }}/runs/{{ run.run_id }}">{{ run.run_id }}</a></td>
  <td>{{ run.workflow }}</td>
  <td class="snippet" title="{{ run.task }}">{{ run.task }}</td>
  <td><span class="pill pill-{{ pill_class(run.status) }}">{{ run.status }}</span></td>
  <td class="num mono">${{ "%.2f"|format(run.total_cost_usd) }}</td>
  <td class="muted mono" title="{{ run.updated_at }}">{{ humanize_ts(run.updated_at) }}</td>
</tr>
