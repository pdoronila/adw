{% extends "base.html" %}
{% block title %}Runs — adw{% endblock %}
{% block content %}
<section class="card" id="runs">
  <div class="card-head">
    <h2>Runs</h2>
    <div class="filters">
      <input id="run-search" name="q" type="search" placeholder="Search runs…" value="{{ q }}"
             hx-get="{{ root }}/fragments/runs" hx-trigger="input changed delay:300ms, search"
             hx-target="#runs-table-wrap" hx-include="#run-status">
      <select id="run-status" name="status"
              hx-get="{{ root }}/fragments/runs" hx-trigger="change"
              hx-target="#runs-table-wrap" hx-include="#run-search">
        <option value="">all statuses</option>
        {% for value in ("running", "paused", "shipped", "failed", "rejected") %}
        <option value="{{ value }}"{% if status == value %} selected{% endif %}>{{ value }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div id="runs-table-wrap"
       hx-get="{{ root }}/fragments/runs" hx-trigger="every 5s"
       hx-include="#run-search, #run-status" hx-swap="innerHTML">
    {% include "_runs_table.html" %}
  </div>
</section>
{% endblock %}
