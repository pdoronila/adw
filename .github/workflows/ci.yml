name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen || uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest -q

      - name: Build wheel
        run: uv build
